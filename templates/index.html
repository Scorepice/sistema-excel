{% extends "base.html" %}
{% block content %}
<div class="card card-custom p-4 shadow-sm mx-auto text-center" style="max-width: 600px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h3 class="m-0" style="color: var(--azul-marino);">📥 Ingreso de Datos</h3>
        <a href="/datos" class="btn btn-primary fw-bold shadow-sm">📊 Ver Base de Datos</a>
    </div>
    
    <div class="p-3 mb-4 rounded" style="background-color: #f8f9fa; border: 1px solid #dee2e6;">
        <h5 class="fw-bold mb-3 text-primary">Carga Masiva de RDM</h5>
        <form action="/subir" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="archivo" class="form-label text-muted">Selecciona tu archivo Excel con el reporte</label>
                <input class="form-control border-primary shadow-sm" type="file" name="archivo" id="archivo" accept=".xlsx, .xls" required>
            </div>
            <button type="submit" class="btn btn-primary fw-bold shadow-sm w-100">📄 Cargar y Procesar Excel</button>
        </form>
    </div>
</div>
{% endblock %}
