{% extends "base.html" %}
{% block content %}

<style>
    /* imagen de fondo cubriendo toda la pantalla */
    body {
        background-image: url("{{ url_for('static', filename='RIG_42.jpg') }}");
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }

    /*tarjeta semi-transparente con efecto cristal para que no tape la imagen */
    .card-glass {
        background-color: rgba(255, 255, 255, 0.85) !important; /* 85% de opacidad */
        backdrop-filter: blur(4px); /* Difumina un poco lo que hay detrás del recuadro */
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
</style>

<div class="card card-custom card-glass p-4 shadow-lg mx-auto text-center mt-4" style="max-width: 600px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
        <h3 class="m-0" style="color: var(--azul-marino); text-shadow: 1px 1px 2px rgba(255,255,255,0.8);">📥 {{ module_name }}</h3>
        <a href="{{ url_for('ver_datos', modulo=modulo) }}" class="btn btn-primary fw-bold shadow-sm">📊 Ver Base de Datos</a>
    </div>
    
    <div class="p-3 mb-4 rounded" style="background-color: rgba(248, 249, 250, 0.7); border: 1px solid rgba(222, 226, 230, 0.5);">
        <h5 class="fw-bold mb-3 text-primary">Carga de Archivo</h5>
        <form action="{{ url_for('subir_excel', modulo=modulo) }}" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="archivo" class="form-label text-dark fw-bold">Selecciona tu archivo Excel con el reporte</label>
                <input class="form-control border-primary shadow-sm" type="file" name="archivo" id="archivo" accept=".xlsx, .xls" required>
            </div>
            <button type="submit" class="btn btn-primary fw-bold shadow-sm w-100">📄 Cargar y Procesar Excel</button>
        </form>
    </div>

    <div class="d-flex align-items-center mb-4">
        <hr class="flex-grow-1 border-secondary">
        <span class="mx-3 text-dark fw-bold">O</span>
        <hr class="flex-grow-1 border-secondary">
    </div>

    <div class="p-3 rounded" style="background-color: rgba(232, 245, 233, 0.7); border: 1px solid rgba(200, 230, 201, 0.5);">
        <h5 class="fw-bold mb-3 text-success">Opción 2: Carga Individual</h5>
        <p class="text-dark mb-3">Registra manualmente un dato para este modulo.</p>
        <a href="{{ url_for('agregar', modulo=modulo) }}" class="btn btn-success fw-bold shadow-sm w-100">➕ Registrar Manualmente</a>
    </div>
</div>
{% endblock %}
