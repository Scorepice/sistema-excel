{% extends "base.html" %}
{% block content %}
<div class="card card-custom p-4 mb-5 text-center shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h3 style="color: var(--azul-marino);">📈 Rendimiento RDM´S</h3>
        <a href="/datos" class="btn btn-secondary fw-bold shadow-sm">Regresar a la Tabla</a>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <h5 class="text-success fw-bold mb-3">✅ RDM Ejecutadas</h5>
            <div style="position: relative; height:50vh; width:100%">
                <canvas id="graficaEjecutadas"></canvas>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <h5 class="text-warning fw-bold mb-3">⏳ RDM Por Ejecutar</h5>
            <div style="position: relative; height:50vh; width:100%">
                <canvas id="graficaPorEjecutar"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN CLAVE: indexAxis: 'y' pone las fechas en el eje vertical
    const opcionesComunes = {
        responsive: true, 
        maintainAspectRatio: false,
        indexAxis: 'y', 
        scales: { 
            x: { beginAtZero: true, ticks: { stepSize: 1 } } 
        }
    };

    // 1. GRÁFICA DE EJECUTADAS
    const ctxEjecutadas = document.getElementById('graficaEjecutadas');
    new Chart(ctxEjecutadas, {
        type: 'bar',
        data: {
            labels: {{ labels_ejec|tojson }},
            datasets: [{ 
                label: 'Cantidad Ejecutadas', 
                data: {{ valores_ejec|tojson }}, 
                backgroundColor: 'rgba(40, 167, 69, 0.7)',
                borderColor: '#28a745',
                borderWidth: 2,
                borderRadius: 4
            }]
        },
        options: opcionesComunes
    });

    // 2. GRÁFICA DE POR EJECUTAR
    const ctxPorEjecutar = document.getElementById('graficaPorEjecutar');
    new Chart(ctxPorEjecutar, {
        type: 'bar',
        data: {
            labels: {{ labels_por|tojson }},
            datasets: [{ 
                label: 'Cantidad Por Ejecutar', 
                data: {{ valores_por|tojson }}, 
                backgroundColor: 'rgba(255, 193, 7, 0.7)',
                borderColor: '#ffc107',
                borderWidth: 2,
                borderRadius: 4
            }]
        },
        options: opcionesComunes
    });
</script>
{% endblock %}
