{% extends "base.html" %}
{% block content %}
<div class="card card-custom p-4 text-center">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h3 style="color: var(--azul-marino);">📈 Rendimiento Acumulado</h3>
        <a href="/datos" class="btn btn-secondary fw-bold shadow-sm">Regresar a la Tabla</a>
    </div>
    
    <div style="position: relative; height:55vh; width:100%">
        <canvas id="grafica"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('grafica');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ labels|tojson }},
            datasets: [{ 
                label: 'Rendimiento Total', 
                data: {{ valores|tojson }}, 
                backgroundColor: 'rgba(23, 101, 157, 0.7)',
                borderColor: '#17659d',
                borderWidth: 2
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>
{% endblock %}
