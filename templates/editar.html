{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center">
    <div class="card card-custom p-4 w-100 shadow-sm" style="max-width: 600px;">
        <h3 class="mb-4 border-bottom pb-2" style="color: var(--azul-marino);">✏️ Editar Información</h3>
        <form action="/editar/{{ fila['rowid'] }}" method="POST">
            {% for col in columnas %}
            <div class="mb-3">
                <label class="form-label text-capitalize fw-bold">{{ col }}</label>
                <input type="text" class="form-control" name="{{ col }}" value="{{ fila[col] }}">
            </div>
            {% endfor %}
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary-custom w-50 fw-bold shadow-sm">Guardar Cambios</button>
                <a href="/datos" class="btn btn-secondary w-50 fw-bold shadow-sm d-flex align-items-center justify-content-center text-decoration-none">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
